# Temporal AND Mockoon run on the host (not bundled here). The user runs:
#   - `temporal server start-dev` on the host
#   - `mockoon-cli start --data ./mockoon/demo.json --port 3001` (or the Mockoon Desktop app) on the host
# Containers reach the host via host.docker.internal (Docker Desktop on macOS/Windows).
# The env values for TEMPORAL_ADDRESS / MOCKOON_BASE_URL / FASTAPI_INTERNAL_URL all come from .env.
services:
  fastapi:
    build:
      context: ./backend
      dockerfile: Dockerfile.fastapi
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    sysctls:
      # Disable IPv6 inside the container so DNS only returns A records
      # and Tonic/grpc doesn't try a non-routable IPv6 ULA for host.docker.internal.
      - net.ipv6.conf.all.disable_ipv6=1
    ports: ["8000:8000"]
    volumes:
      - fastapi-data:/app/fastapi_app
      - /var/run/docker.sock:/var/run/docker.sock
    networks: [demo_net]

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    sysctls:
      # Disable IPv6 inside the container so DNS only returns A records
      # and Tonic/grpc doesn't try a non-routable IPv6 ULA for host.docker.internal.
      - net.ipv6.conf.all.disable_ipv6=1
    depends_on: [fastapi]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - sandbox-data:/data
    networks: [demo_net]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports: ["5173:5173"]
    depends_on: [fastapi]
    networks: [demo_net]

networks:
  demo_net:
    driver: bridge

volumes:
  fastapi-data:
  # Fixed name (no compose project prefix) so the worker can spawn sibling sandbox
  # containers via docker.sock and reference the volume by the same bare name.
  sandbox-data:
    name: sandbox-data
